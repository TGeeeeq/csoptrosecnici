<?xml version="1.0" encoding="UTF-8"?>
<!-- Antonín Figueroa — AF Monogram (static, on dark background) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="240" height="240" role="img" aria-label="AF monogram on dark background">
  <defs>
    <style><![CDATA[
      text { font-family: 'Cormorant Garamond', 'Times New Roman', Georgia, serif; font-weight: 500; }
    ]]></style>
  </defs>

  <rect width="100" height="100" fill="#0a0908"/>

  <circle cx="50" cy="50" r="46" fill="none" stroke="#d4a45a" stroke-opacity="0.35" stroke-width="0.6" stroke-dasharray="2 4"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#d4a45a" stroke-opacity="0.55" stroke-width="0.5"/>
  <circle cx="50" cy="22" r="1.6" fill="#d4a45a"/>

  <circle cx="40" cy="50" r="22" fill="none" stroke="#d4a45a" stroke-opacity="0.7" stroke-width="0.7"/>
  <circle cx="60" cy="50" r="22" fill="none" stroke="#d4a45a" stroke-opacity="0.7" stroke-width="0.7"/>

  <text x="39" y="60" font-size="28" text-anchor="middle" fill="#d4a45a" letter-spacing="-1">A</text>
  <text x="58" y="60" font-size="28" text-anchor="middle" fill="#f1e9d8" letter-spacing="-1">F</text>
</svg>
